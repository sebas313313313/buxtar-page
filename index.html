<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logos/logo-buxtar-200.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Security Meta Tags -->
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta http-equiv="X-Frame-Options" content="DENY" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
      connect-src 'self';
      frame-src 'none';
      object-src 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <!-- SEO -->
    <title>Buxtar Digital Solutions | Soluciones digitales que transforman tu negocio</title>
    <meta name="description" content="Somos una empresa de tecnología especializada en desarrollo de software, transformación digital y soluciones empresariales innovadoras en Colombia." />
    <meta name="keywords" content="desarrollo software, transformación digital, consultoría TI, aplicaciones móviles, diseño UX UI, Buxtar, Colombia" />
    <meta name="author" content="Buxtar Digital Solutions" />

    <!-- Open Graph -->
    <meta property="og:title" content="Buxtar Digital Solutions" />
    <meta property="og:description" content="Soluciones digitales que transforman tu negocio" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logos/logo-buxtar-200.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="Buxtar Digital Solutions" />
    <meta name="twitter:description" content="Soluciones digitales que transforman tu negocio" />

    <!-- Google Fonts preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
